services:
  db:
    image: postgres:15-alpine
    container_name: nitro-bot-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nitro_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nitrodb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    networks:
      - nitro_internal_net

  minio:
    image: minio/minio
    container_name: nitro-bot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    restart: always
    networks:
      - nitro_internal_net

  backend:
    build: 
      context: ./backend
    container_name: nitro-bot-backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_GROUP_ID=${ADMIN_GROUP_ID}
      - SELENIUM_SECRET_KEY=${SELENIUM_SECRET_KEY}
    depends_on:
      - db
      - minio
    restart: always
    networks:
      - nitro_internal_net
      - caddy_gateway_net

  frontend:
    build:
      context: ./frontend
    container_name: nitro-bot-frontend
    restart: always
    networks:
      - caddy_gateway_net

volumes:
  pgdata:
  miniodata:

networks:
  nitro_internal_net:
    name: nitro_internal_net
  caddy_gateway_net:
    external: true