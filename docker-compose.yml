services:
  db:
    image: postgres:15-alpine
    container_name: nitro-bot-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nitro_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nitrodb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nitro_admin} -d $${POSTGRES_DB:-nitrodb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nitro_internal_net

  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: nitro-bot-db-backup
    restart: always
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-nitrodb}
      POSTGRES_USER: ${POSTGRES_USER:-nitro_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    networks:
      - nitro_internal_net

  minio:
    image: minio/minio
    container_name: nitro-bot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    restart: always
    networks:
      - nitro_internal_net

  backend:
    build:
      context: ./backend
    container_name: nitro-bot-backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_GROUP_ID=${ADMIN_GROUP_ID}
      - MINI_APP_URL=${MINI_APP_URL}
      - SELENIUM_SECRET_KEY=${SELENIUM_SECRET_KEY}
      - SKIP_TELEGRAM_AUTH=${SKIP_TELEGRAM_AUTH:-false}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    restart: always
    networks:
      - nitro_internal_net
      - caddy_gateway_net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: nitro-bot-frontend
    restart: always
    networks:
      - nitro_internal_net
      - caddy_gateway_net

volumes:
  pgdata:
  miniodata:

networks:
  nitro_internal_net:
    name: nitro_internal_net
  caddy_gateway_net:
    external: true
