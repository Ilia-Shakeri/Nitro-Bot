services:
  db:
    image: postgres:15-alpine
    container_name: nitro-bot-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nitro_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nitrodb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nitro_admin} -d $${POSTGRES_DB:-nitrodb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nitro_internal_net

  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: nitro-bot-db-backup
    restart: always
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-nitrodb}
      POSTGRES_USER: ${POSTGRES_USER:-nitro_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Image already gzips every dump — don't double-compress here.
      # Take a dump the moment the service starts, then run on schedule.
      BACKUP_ON_START: "TRUE"
      SCHEDULE: "@daily"
      # Grandfather-father-son retention so old data is recoverable for months.
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      # Internal healthcheck server (fails if last backup is too old).
      HEALTHCHECK_PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 5m
      timeout: 30s
      retries: 3
      start_period: 1m
    networks:
      - nitro_internal_net

  minio:
    image: minio/minio
    container_name: nitro-bot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    restart: always
    networks:
      - nitro_internal_net

  backend:
    build:
      context: ./backend
    container_name: nitro-bot-backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_GROUP_ID=${ADMIN_GROUP_ID}
      - ORDER_TOPIC_ID=${ORDER_TOPIC_ID:-}
      - TICKET_TOPIC_ID=${TICKET_TOPIC_ID:-}
      - PAYMENT_TOPIC_ID=${PAYMENT_TOPIC_ID:-}
      - MINI_APP_URL=${MINI_APP_URL}
      - APP_VERSION=${APP_VERSION:-2026-07-06-producers-convert-v5}
      - USDT_RATE_URL=${USDT_RATE_URL:-}
      - USDT_TOMAN_FALLBACK=${USDT_TOMAN_FALLBACK:-0}
      - SELENIUM_SECRET_KEY=${SELENIUM_SECRET_KEY}
      - SKIP_TELEGRAM_AUTH=${SKIP_TELEGRAM_AUTH:-false}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    restart: always
    networks:
      - nitro_internal_net
      - caddy_gateway_net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: nitro-bot-frontend
    restart: always
    networks:
      - nitro_internal_net
      - caddy_gateway_net

  dmb-automation:
    build:
      context: ./dmb-automation
    container_name: nitro-bot-dmb-automation
    environment:
      - API_BASE_URL=http://backend:8000
      - SELENIUM_SECRET_KEY=${SELENIUM_SECRET_KEY}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-nitro-bot}
      - DMB_USERNAME=${DMB_USERNAME}
      - DMB_PASSWORD=${DMB_PASSWORD}
      - POLL_INTERVAL=${POLL_INTERVAL:-30}
      - DRY_RUN=${DRY_RUN:-false}
    depends_on:
      backend:
        condition: service_started
      minio:
        condition: service_started
    restart: always
    volumes:
      # Persist Robot logs/screenshots on the host for debugging failed releases.
      - ./dmb-results:/app/results
    networks:
      - nitro_internal_net

# Explicit names pin the volumes so a project-name change or `--build` can never
# silently create fresh empty volumes. Data survives recreation forever.
volumes:
  pgdata:
    name: nitro_bot_pgdata
  miniodata:
    name: nitro_bot_miniodata

networks:
  nitro_internal_net:
    name: nitro_internal_net
  caddy_gateway_net:
    external: true
